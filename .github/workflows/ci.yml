name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: node src/build.ts --skip-og

      # 出力の整合性検証（全ページ存在・XML整形式・フィード件数等）
      - run: node src/check.ts
